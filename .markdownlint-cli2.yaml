# markdownlint-cli2 config for unsloth-cli.
# markdownlint-cli2 stops walking at the git root, so a per-user global config
# in the home directory isn't picked up from inside the repo.
# Mirrors the guildmaster / steward / teken preset for workspace consistency.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true

ignores:
  - "node_modules/**"
  - ".local/**"
  - ".afi/**"
  - ".teken/**"
  # Vendored skills are cited verbatim from guildmaster — do not reformat them.
  - ".claude/skills/**"
  # The virtualenv carries vendored package READMEs (unsloth/torch are base deps
  # now) — not our prose; never lint them. The CI lint job runs `uv sync` before
  # markdownlint, so .venv exists when the linter walks the tree.
  - ".venv/**"
  # devague-generated specs/plans use <placeholder> angle-bracket syntax that
  # markdownlint reads as inline HTML (MD033). They are tool artifacts, not prose.
  - "docs/specs/**"
  - "docs/plans/**"
  # devague frame/review working state (mostly gitignored anyway).
  - ".devague/**"
